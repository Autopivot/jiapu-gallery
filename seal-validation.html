<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEAL Hard-Negative Validation — RuleVis</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --surface2: #21253a;
    --border:   #2e3346;
    --text:     #e2e4ef;
    --muted:    #7a7f9a;
    --gold:     #f5c842;
    --c-random:    #e05555;
    --c-community: #e09320;
    --c-twohop:    #3dba5f;
    --c-pos:       #4a7fe5;
    --radius:   10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── header ── */
  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    max-width: 1200px;
    margin: 0 auto;
  }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 10px; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -.3px; color: #fff; }
  header p  { color: var(--muted); font-size: 13px; line-height: 1.6; max-width: 780px; }
  .lang-group { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
  .lang-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .15s;
  }
  .lang-btn.active, .lang-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ── breadcrumb ── */
  .breadcrumb {
    max-width: 1200px; margin: 0 auto;
    padding: 10px 40px; font-size: 12px; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--gold); }
  .breadcrumb span { margin: 0 6px; }

  /* ── main layout ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px; }

  /* ── condition cards ── */
  .cards-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .cond-card {
    flex: 1; min-width: 240px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
    position: relative; overflow: hidden;
  }
  .cond-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .cond-card.random::before  { background: var(--c-random); }
  .cond-card.community::before { background: var(--c-community); }
  .cond-card.twohop::before  { background: var(--c-twohop); }
  .cond-badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .random  .cond-badge { background: rgba(224,85,85,.15);  color: var(--c-random); }
  .community .cond-badge { background: rgba(224,147,32,.15); color: var(--c-community); }
  .twohop  .cond-badge { background: rgba(61,186,95,.15);  color: var(--c-twohop); }
  .cond-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #fff; }
  .cond-desc { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }
  .cond-metrics { display: flex; gap: 20px; }
  .metric { display: flex; flex-direction: column; gap: 3px; }
  .metric-val {
    font-size: 28px; font-weight: 700; letter-spacing: -.5px;
    font-variant-numeric: tabular-nums;
  }
  .metric-val.auc { color: #fff; }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .metric-conn { color: var(--muted); font-size: 18px; font-weight: 600; }
  .metric-conn.high { color: var(--c-twohop); }
  .metric-conn.mid  { color: var(--c-community); }
  .metric-conn.low  { color: var(--c-random); }

  /* ── positive reference row ── */
  .pos-ref {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: var(--radius); padding: 14px 22px;
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 32px; flex-wrap: wrap;
  }
  .pos-ref-label { font-size: 12px; font-weight: 600; color: var(--c-pos); text-transform: uppercase; letter-spacing: .3px; }
  .pos-ref-val   { font-size: 16px; font-weight: 600; color: #fff; }
  .pos-ref-desc  { font-size: 12px; color: var(--muted); }

  /* ── chart section ── */
  .charts-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .chart-panel {
    flex: 1; min-width: 300px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
  }
  .chart-panel h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 16px; }
  .chart-wrap { width: 100%; }
  svg.bar-chart { width: 100%; height: 180px; }
  .bar-label { fill: var(--text); font-size: 12px; font-family: 'Inter', sans-serif; }
  .bar-val   { fill: #fff;        font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; }
  .bar-muted { fill: var(--muted); font-size: 11px; font-family: 'Inter', sans-serif; }

  /* ── explanation section ── */
  .explain-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 32px; overflow: hidden;
  }
  .explain-header {
    padding: 16px 22px; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none; gap: 12px;
  }
  .explain-header:hover { background: rgba(255,255,255,.03); }
  .explain-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
  .explain-toggle { font-size: 18px; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .explain-toggle.open { transform: rotate(45deg); }
  .explain-body {
    padding: 0 22px; max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s;
  }
  .explain-body.open { max-height: 1200px; padding: 0 22px 22px; }
  .explain-body p { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 12px; }
  .explain-body p:last-child { margin-bottom: 0; }
  .explain-body strong { color: var(--text); }
  .explain-body .highlight-box {
    background: rgba(245,200,66,.06); border-left: 3px solid var(--gold);
    padding: 12px 16px; border-radius: 0 6px 6px 0;
    margin: 14px 0;
  }
  .explain-body .highlight-box p { margin-bottom: 0; }
  .step-list { list-style: none; margin: 12px 0; }
  .step-list li {
    padding: 8px 12px 8px 36px; position: relative;
    border-left: 1px solid var(--border); margin-bottom: 8px;
    color: var(--muted); font-size: 12.5px; line-height: 1.6;
  }
  .step-list li::before {
    content: attr(data-n);
    position: absolute; left: -12px; top: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--text);
    line-height: 22px; text-align: center;
  }
  .step-list li strong { color: var(--text); }

  /* ── meta strip ── */
  .meta-strip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 22px;
    display: flex; gap: 28px; flex-wrap: wrap;
  }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .meta-val { font-size: 14px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

  /* ── loading / error ── */
  .loading-msg { text-align: center; padding: 60px; color: var(--muted); }
  .error-msg { text-align: center; padding: 40px; color: var(--c-random); font-size: 13px; }

  /* ── responsive ── */
  @media (max-width: 700px) {
    header, .breadcrumb, .main { padding-left: 16px; padding-right: 16px; }
    .cond-card { min-width: 100%; }
    .chart-panel { min-width: 100%; }
  }
</style>
</head>
<body>

function T(key) {

}

function applyLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.title = T('page_title');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = T(el.dataset.i18nHtml); });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  if (window._evalData) renderAll(window._evalData);
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});


// ── chart helpers ──────────────────────────────────────────────────────────
function renderBarChart(svgEl, items) {
  // items: [{label, value, color, max}]
  const W = svgEl.clientWidth || 400;
  const H = 180;
  const marginL = 110, marginR = 55, marginT = 10, marginB = 10;
  const barW = (H - marginT - marginB) / items.length - 8;
  const chartW = W - marginL - marginR;

  const maxVal = items[0].max ?? d3.max(items, d => d.value);

  const svg = d3.select(svgEl)
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');
  svg.selectAll('*').remove();

  const g = svg.append('g').attr('transform', `translate(${marginL},${marginT})`);
  const innerH = H - marginT - marginB;

  // y scale
  const y = d3.scaleBand()
    .domain(items.map((_, i) => i))
    .range([0, innerH])
    .padding(0.35);

  // x scale
  const x = d3.scaleLinear().domain([0, maxVal]).range([0, chartW]);

  // background track
  g.selectAll('.track')
    .data(items)
    .enter().append('rect')
    .attr('class', 'track')
    .attr('x', 0).attr('y', (_, i) => y(i))
    .attr('width', chartW).attr('height', y.bandwidth())
    .attr('rx', 3).attr('fill', 'rgba(255,255,255,.04)');

  // bars
  g.selectAll('.bar')
    .data(items)
    .enter().append('rect')
    .attr('class', 'bar')
    .attr('x', 0).attr('y', (_, i) => y(i))
    .attr('width', d => x(d.value)).attr('height', y.bandwidth())
    .attr('rx', 3).attr('fill', d => d.color);

  // value labels
  g.selectAll('.val-label')
    .data(items)
    .enter().append('text')
    .attr('class', 'bar-val')
    .attr('x', d => x(d.value) + 6)
    .attr('y', (_, i) => y(i) + y.bandwidth() / 2 + 4)
    .text(d => d.fmt ? d.fmt(d.value) : d.value.toFixed(4));

  // row labels
  g.selectAll('.row-label')
    .data(items)
    .enter().append('text')
    .attr('class', 'bar-label')
    .attr('x', -8).attr('y', (_, i) => y(i) + y.bandwidth() / 2 + 4)
    .attr('text-anchor', 'end')
    .text(d => d.label);
}


// ── render ─────────────────────────────────────────────────────────────────
function connClass(pct) {
  if (pct >= 65) return 'high';
  if (pct >= 25) return 'mid';
  return 'low';
}

function renderAll(data) {
  const app = document.getElementById('app');
  const loading = document.getElementById('loading');
  if (loading) loading.remove();
  const meta = data._meta || {};

  // ── model-missing warning ──
  let warningHtml = '';
  if (meta.model_found === false) {
    warningHtml = `
    <div style="background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.4);border-radius:var(--radius);padding:12px 18px;margin-bottom:20px;color:#e07070;font-size:12.5px;">
      <strong>${T('warn_no_model_title')}</strong> ${T('warn_no_model_body')}
    </div>`;
  }

  const r   = data.random    || {};
  const c   = data.community || {};
  const h   = data['2hop']   || {};
  const pos = data.positive  || {};

  const conditions = [
    { key: 'random',    d: r, cls: 'random',    nameKey: 'cond_random',    badgeKey: 'badge_random',    descKey: 'desc_random' },
    { key: 'community', d: c, cls: 'community',  nameKey: 'cond_community', badgeKey: 'badge_community', descKey: 'desc_community' },
    { key: '2hop',      d: h, cls: 'twohop',     nameKey: 'cond_twohop',    badgeKey: 'badge_twohop',    descKey: 'desc_twohop' },
  ];

  const colors = { random: 'var(--c-random)', community: 'var(--c-community)', twohop: 'var(--c-twohop)' };
  const hexColors = { random: '#e05555', community: '#e09320', twohop: '#3dba5f' };

  // ── condition cards ──
  let cardsHtml = '<div class="cards-row">';
  for (const { d, cls, nameKey, badgeKey, descKey } of conditions) {
    const auc = typeof d.auc === 'number' ? d.auc.toFixed(4) : '—';
    const pct = typeof d.pct_connected === 'number' ? d.pct_connected.toFixed(1) + '%' : '—';
    const pctCls = typeof d.pct_connected === 'number' ? connClass(d.pct_connected) : '';
    cardsHtml += `
    <div class="cond-card ${cls}">
      <div class="cond-badge">${T(badgeKey)}</div>
      <div class="cond-name">${T(nameKey)}</div>
      <div class="cond-desc">${T(descKey)}</div>
      <div class="cond-metrics">
        <div class="metric">
          <div class="metric-val auc">${auc}</div>
          <div class="metric-label">${T('lbl_auc')}</div>
        </div>
        <div class="metric">
          <div class="metric-conn ${pctCls}">${pct}</div>
          <div class="metric-label">${T('lbl_conn')}</div>
        </div>
      </div>
    </div>`;
  }
  cardsHtml += '</div>';

  // ── positive reference ──
  const posConn = typeof pos.pct_connected === 'number' ? pos.pct_connected.toFixed(1) + '%' : '—';
  const posHtml = `
  <div class="pos-ref">
    <div class="pos-ref-label">${T('pos_label')}</div>
    <div style="display:flex;gap:16px;align-items:center;flex:1">
      <div class="metric" style="flex-direction:row;align-items:center;gap:10px">
        <div class="pos-ref-val" style="color:var(--c-pos)">${posConn}</div>
        <div class="metric-label">${T('pos_conn_label')}</div>
      </div>
      <div class="pos-ref-desc">${T('pos_desc')}</div>
    </div>
  </div>`;

  // ── charts ──
  const chartsHtml = `
  <div class="charts-row">
    <div class="chart-panel">
      <h3>${T('chart_auc')}</h3>
      <div class="chart-wrap"><svg class="bar-chart" id="chart-auc"></svg></div>
    </div>
    <div class="chart-panel">
      <h3>${T('chart_conn')}</h3>
      <div class="chart-wrap"><svg class="bar-chart" id="chart-conn"></svg></div>
    </div>
  </div>`;

  // ── explanation ──
  const explainHtml = `
  <div class="explain-section">
    <div class="explain-header" id="explain-toggle-btn">
      <h3>${T('explain_title')}</h3>
      <div class="explain-toggle open" id="explain-icon">−</div>
    </div>
    <div class="explain-body open" id="explain-body">
      <p>${T('explain_p1')}</p>
      <p>${T('explain_p2')}</p>
      <div class="highlight-box"><p>${T('explain_highlight')}</p></div>
      <p>${T('explain_p3')}</p>
      <p><strong>${T('explain_steps_title')}</strong></p>
      <ul class="step-list">
        <li data-n="1">${T('step1')}</li>
        <li data-n="2">${T('step2')}</li>
        <li data-n="3">${T('step3')}</li>
        <li data-n="4">${T('step4')}</li>
      </ul>
      <div style="margin-top:16px">
        <p><strong>${T('interp_title')}</strong></p>
        <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:rgba(61,186,95,.07);border-radius:6px;border-left:3px solid var(--c-twohop)">
            <div style="font-size:16px;font-weight:700;color:var(--c-twohop);min-width:80px;flex-shrink:0">${T('interp_high_val')}</div>
            <div style="color:var(--muted);font-size:12.5px;line-height:1.6">${T('interp_high')}</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:rgba(224,147,32,.07);border-radius:6px;border-left:3px solid var(--c-community)">
            <div style="font-size:16px;font-weight:700;color:var(--c-community);min-width:80px;flex-shrink:0">${T('interp_mid_val')}</div>
            <div style="color:var(--muted);font-size:12.5px;line-height:1.6">${T('interp_mid')}</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 12px;background:rgba(224,85,85,.07);border-radius:6px;border-left:3px solid var(--c-random)">
            <div style="font-size:16px;font-weight:700;color:var(--c-random);min-width:80px;flex-shrink:0">${T('interp_low_val')}</div>
            <div style="color:var(--muted);font-size:12.5px;line-height:1.6">${T('interp_low')}</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  // ── meta strip ──
  const ts = meta.timestamp ? new Date(meta.timestamp).toLocaleString() : '—';
  const modelStatus = meta.model_found === true ? T('meta_found') : meta.model_found === false ? T('meta_missing') : '—';
  const metaHtml = `
  <div class="meta-strip">
    <div class="meta-item"><div class="meta-key">${T('meta_seed')}</div><div class="meta-val">${meta.seed ?? '—'}</div></div>
    <div class="meta-item"><div class="meta-key">${T('meta_kneg')}</div><div class="meta-val">${meta.k_neg ?? '—'}</div></div>
    <div class="meta-item"><div class="meta-key">${T('meta_pool')}</div><div class="meta-val">${typeof meta.mean_2hop_pool_size === 'number' ? meta.mean_2hop_pool_size.toFixed(1) : '—'}</div></div>
    <div class="meta-item"><div class="meta-key">${T('meta_npairs')}</div><div class="meta-val">${meta.n_valid_pos ?? '—'}</div></div>
    <div class="meta-item"><div class="meta-key">${T('meta_model')}</div><div class="meta-val">${modelStatus}</div></div>
    <div class="meta-item"><div class="meta-key">${T('meta_ts')}</div><div class="meta-val" style="font-size:12px">${ts}</div></div>
  </div>`;

  app.innerHTML = warningHtml + cardsHtml + posHtml + chartsHtml + explainHtml + metaHtml;

  // ── draw charts ──
  const aucItems = conditions.map(({ key, d, cls }) => ({
    label: T({ random: 'cond_random', community: 'cond_community', '2hop': 'cond_twohop' }[key]),
    value: typeof d.auc === 'number' ? d.auc : 0,
    color: hexColors[cls],
    max: 1.0,
    fmt: v => v.toFixed(4),
  }));
  const connItems = [
    ...conditions.map(({ key, d, cls }) => ({
      label: T({ random: 'cond_random', community: 'cond_community', '2hop': 'cond_twohop' }[key]),
      value: typeof d.pct_connected === 'number' ? d.pct_connected : 0,
      color: hexColors[cls],
      max: 100,
      fmt: v => v.toFixed(1) + '%',
    })),
    {
      label: T('pos_short'),
      value: typeof pos.pct_connected === 'number' ? pos.pct_connected : 0,
      color: '#4a7fe5',
      max: 100,
      fmt: v => v.toFixed(1) + '%',
    },
  ];

  renderBarChart(document.getElementById('chart-auc'), aucItems);
  renderBarChart(document.getElementById('chart-conn'), connItems);

  // ── explain toggle ──
  document.getElementById('explain-toggle-btn').addEventListener('click', () => {
    const body = document.getElementById('explain-body');
    const icon = document.getElementById('explain-icon');
    body.classList.toggle('open');
    icon.classList.toggle('open');
    icon.textContent = body.classList.contains('open') ? '−' : '+';
  });
}


// ── fetch data ──────────────────────────────────────────────────────────────
fetch('data/hard_neg_eval.json')
  .then(r => {
    if (!r.ok) throw new Error(r.status);
    return r.json();
  })
  .then(data => {
    window._evalData = data;
    renderAll(data);
  })
  .catch(() => {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="error-msg">${T('error')}</div>`;
  });
</script>
</body>
</html>
